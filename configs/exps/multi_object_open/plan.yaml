# Plan Configuration for Multi-Object Open Experiment
# Experiment for multiple articulated objects (Microwave, Dishwasher, Oven)
#
# This config overrides defaults from configs/config.yaml

# =============================================================================
# Experiment Info
# =============================================================================
info_cfg:
  task: "multi_object_open"
  robot: "summit_franka"
  scene: ["scene_0_seed_0", "scene_1_seed_1", "scene_3_seed_3"]
  object: ["7221", "11622", "101773"]
  description: "Multi-object open experiment for Microwave, Dishwasher, and Oven"

# =============================================================================
# Planning Configuration
# =============================================================================
plan_cfg:
  # Output directory for this experiment
  output_dir: "data/multi_object_open"
  
  # Number of grasp poses to use
  num_grasps: 20
  
  # IK clustering parameters
  cluster:
    ap_fallback_clusters: 50
    ap_clusters_upperbound: 200
    ap_cluster_lowerbound: 20
    
  # IK planning limits
  plan_ik:
    limit: [100, 100]
    
  # Trajectory planning parameters
  plan_traj:
    batch_size: 10
    expand_to_pairs: true
    
  # Trajectory filtering thresholds
  filter:
    position_threshold: 0.01
    orientation_threshold: 0.05

# =============================================================================
# Scene Configuration
# =============================================================================
scene_cfg:
  scene_0_seed_0:
    path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/info/metadata.json"
  scene_1_seed_1:
    path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/info/metadata.json"
  scene_3_seed_3:
    path: "assets/scene/infinigen/kitchen_1130/scene_3_seed_3/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_3_seed_3/info/metadata.json"

# =============================================================================
# Object Configuration
# =============================================================================
object_cfg:
  "7221":
    path: "assets/object/Microwave/7221/7221_0_scaling.urdf"
    asset_type: "Microwave"
    asset_id: "7221"
    scale: 0.3563
    start_angles: [0]
    goal_angles: [1.57, 0.9]
  "11622":
    path: "assets/object/Dishwasher/11622/11622_0_scaling.urdf"
    asset_type: "Dishwasher"
    asset_id: "11622"
    scale: 0.6446
    start_angles: [0]
    goal_angles: [1.57, 1.0]
  "101773":
    path: "assets/object/Oven/101773/101773_0_scaling.urdf"
    asset_type: "Oven"
    asset_id: "101773"
    scale: 0.4218
    start_angles: [0]
    goal_angles: [1.57, 0.8]

# =============================================================================
# Robot Configuration
# =============================================================================
robot_cfg:
  robot_type: "summit_franka"
  path: "assets/robot/summit_franka/summit_franka.yml"

# AKR robot config template for articulated object planning (fixed base)
akr_robot_cfg:
  robot_type: "summit_franka"
  path: ""  # Populated dynamically per grasp
  fixed_base: true

