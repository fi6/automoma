name: automoma
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Python version
  - python>=3.10,<3.12
  
  # Core scientific packages
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  
  # PyTorch with CUDA
  - pytorch>=2.0
  - pytorch-cuda=12.1
  - torchvision
  - torchaudio
  
  # Visualization
  - matplotlib>=3.7
  - opencv>=4.8
  
  # Data handling
  - h5py>=3.9
  - pyyaml>=6.0
  - zarr>=2.16
  
  # Development tools
  - pip>=23.0
  - jupyter
  - ipywidgets
  - tqdm
  
  # Testing
  - pytest>=7.0
  
  # Pip packages
  - pip:
    # Core dependencies
    - gymnasium>=0.29
    - tensordict>=0.3
    
    # Planning dependencies (optional - requires CUDA)
    # - nvidia-curobo  # Install separately with CUDA
    - yourdfpy>=0.0.53
    - omegaconf>=2.3
    - hydra-core>=1.3
    
    # Scene processing (optional)
    - trimesh>=4.0
    - warp-lang>=1.0
    
    # Machine learning
    - transformers>=4.30
    - diffusers>=0.25
    - accelerate>=0.25
    - einops>=0.7
    - safetensors>=0.4
    
    # LeRobot (for policy training)
    # - lerobot  # Install from source
    
    # Logging and monitoring
    - wandb>=0.16
    - tensorboard>=2.15
    
    # Development
    - black>=23.0
    - isort>=5.12
    - flake8>=6.0
    - mypy>=1.0
    - pre-commit>=3.0
    
    # Additional utilities
    - pyrealsense2>=2.54  # For RealSense cameras
    - open3d>=0.18  # For point cloud processing
    - scikit-learn>=1.3  # For clustering
    
# Notes:
# 1. Isaac Sim must be installed separately
# 2. cuRobo requires CUDA and should be installed from source
# 3. LeRobot should be installed from the third_party/lerobot directory
# 4. scene-synthesizer requires additional dependencies
