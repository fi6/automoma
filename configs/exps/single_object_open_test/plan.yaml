# Plan Configuration for Single Object Open Test Experiment
# Test experiment for object 7221 with limited scenes
#
# This config overrides defaults from configs/config.yaml

# =============================================================================
# Experiment Info
# =============================================================================
info_cfg:
  task: "single_object_open_test"
  robot: "summit_franka"
  scene: [scene_0_seed_0, scene_1_seed_1, scene_3_seed_3, scene_7_seed_7, scene_8_seed_8, scene_9_seed_9, scene_10_seed_10, scene_12_seed_12, scene_13_seed_13, scene_16_seed_16, scene_17_seed_17, scene_18_seed_18, scene_20_seed_20, scene_21_seed_21, scene_23_seed_23, scene_24_seed_24, scene_25_seed_25, scene_27_seed_27, scene_28_seed_28, scene_29_seed_29, scene_30_seed_30, scene_31_seed_31, scene_32_seed_32, scene_33_seed_33, scene_34_seed_34, scene_35_seed_35, scene_36_seed_36, scene_38_seed_38, scene_39_seed_39, scene_40_seed_40, scene_41_seed_41, scene_42_seed_42, scene_43_seed_43, scene_44_seed_44, scene_45_seed_45, scene_46_seed_46, scene_47_seed_47, scene_48_seed_48, scene_52_seed_52, scene_53_seed_53]
  object: ["7221"]
  description: "Single object open test for pipeline validation"

# =============================================================================
# Planning Configuration
# =============================================================================
plan_cfg:
  # Output directory for this experiment
  output_dir: "data/single_object_open_test"
  
  # Number of grasp poses to use
  num_grasps: 20
  
  # Collision world parameters
  voxel_dims: [5.0, 5.0, 5.0]
  voxel_size: 0.02
  expand_dims: [1.0, 0.2, 0.2]
  collision_checker_type: "VOXEL"
  
  # Motion planning seeds
  num_trajopt_seeds: 12
  num_graph_seeds: 12
  interpolation_dt: 0.05
  
  # IK clustering parameters
  cluster:
    ap_fallback_clusters: 30
    ap_clusters_upperbound: 80
    ap_cluster_lowerbound: 10
  
  # IK planning limits [start_limit, goal_limit]
  plan_ik:
    limit: [100, 100]
  
  # Trajectory planning parameters
  plan_traj:
    batch_size: 10
    expand_to_pairs: true
  
  # Trajectory filtering thresholds
  filter:
    position_threshold: 0.01
    orientation_threshold: 0.05
  
  # Resume support - skip already completed planning tasks
  resume: true

# =============================================================================
# Environment Configuration (No sim_cfg needed for planning)
# =============================================================================
env_cfg:
  # Robot Configuration
  robot_cfg:
    robot_type: "summit_franka"
    path: "assets/robot/summit_franka/summit_franka.yml"
    mobile_base_dof: 3
    arm_dof: 7
    gripper_dof: 2
    total_dof: 12
  
  # AKR robot config template for articulated object planning (fixed base)
  akr_robot_cfg:
    robot_type: "summit_franka"
    path: ""  # Populated dynamically per grasp
    fixed_base: true
  
  # Object Configuration
  object_cfg:
    "7221":
      path: assets/object/Microwave/7221/7221_0_scaling.urdf
      pose: [0, 0, 0, 1, 0, 0, 0]
      asset_type: "Microwave"
      asset_id: "7221"
      scale: 0.3563
      start_angles: [0]
      goal_angles: [1.333, 1.23, 1.074, 0.997]
      
      # Optional: Per-object plan_cfg override
      # Uncomment and customize to override default plan_cfg for this object
      plan_cfg:
          plan_ik:
            limit: [50, 50]
  
  # Scene Configuration
