# AutoMoMa Base Configuration
# This is the base configuration file that can be extended by experiment configs
# All values here serve as defaults and can be overridden in experiment configs

# =============================================================================
# Default Settings
# =============================================================================
defaults:
  robot_type: summit_franka
  scene_format: infinigen
  dataset_format: lerobot

# =============================================================================
# Paths (relative to project root)
# =============================================================================
paths:
  assets: assets
  data: data
  outputs: outputs
  robots: assets/robot
  scenes: assets/scene
  objects: assets/object

# =============================================================================
# Robot Configurations
# =============================================================================
robot:
  summit_franka:
    path: assets/robot/summit_franka/summit_franka.yml
    mobile_base_dof: 3
    arm_dof: 7
    gripper_dof: 2
    total_dof: 12

# =============================================================================
# Camera Configuration
# =============================================================================
camera:
  ego_topdown:
    resolution: [320, 240]
    frequency: 30
    pose_type: local
  ego_wrist:
    resolution: [320, 240]
    frequency: 30
    focal_length: 1.5
    pose_type: local
  fix_local:
    resolution: [320, 240]
    frequency: 30
    pose_type: local

# =============================================================================
# Environment Configuration
# =============================================================================
env_cfg:
  lighting_mode: "default"
  collision_free_prim_paths: []
  physics_dt: 0.01
  rendering_dt: 0.01

# =============================================================================
# Planning Parameters
# =============================================================================
planning:
  # Resume support - skip already completed planning tasks
  resume: true
  
  # Collision world parameters
  voxel_dims: [5.0, 5.0, 5.0]
  voxel_size: 0.02
  expand_dims: [1.0, 0.2, 0.2]
  collision_checker_type: VOXEL
  
  # Motion planning seeds
  num_trajopt_seeds: 12
  num_graph_seeds: 12
  interpolation_dt: 0.05
  
  # IK clustering parameters
  cluster:
    ap_fallback_clusters: 30
    ap_clusters_upperbound: 80
    ap_cluster_lowerbound: 10
  
  # IK planning limits [start_limit, goal_limit]
  plan_ik:
    limit: [100, 100]
  
  # Trajectory planning parameters
  plan_traj:
    batch_size: 10
    expand_to_pairs: true
  
  # Trajectory filtering thresholds
  filter:
    position_tolerance: 0.01
    rotation_tolerance: 0.05

# =============================================================================
# Dataset Recording Parameters
# =============================================================================
dataset:
  # Resume support - skip already recorded trajectories
  resume: true
  fps: 15
  use_videos: true
  state_dim: 12
  camera_names:
    - ego_topdown
    - ego_wrist
    - fix_local

# =============================================================================
# Training Parameters
# =============================================================================
training:
  batch_size: 64
  learning_rate: 0.0001
  num_epochs: 100
  warmup_steps: 500
  grad_clip: 10.0
  
  # DP (Diffusion Policy) defaults
  diffusion:
    n_action_steps: 8
    horizon: 16
    n_obs_steps: 2
    
  # ACT defaults
  act:
    chunk_size: 100
    kl_weight: 10.0
    hidden_dim: 512
    dim_feedforward: 3200
    num_encoder_layers: 4
    num_decoder_layers: 7
    nheads: 8

# =============================================================================
# Evaluation Parameters
# =============================================================================
evaluation:
  num_episodes: 50
  max_steps_per_episode: 500
  success_threshold: 0.05
  use_async_inference: true
