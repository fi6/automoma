# Plan Configuration for Single Object Open Test Experiment
# Test experiment for object 7221 with limited scenes

info_cfg:
  task: "single_object_open_test"
  robot: "summit_franka"
  scene: ["scene_0_seed_0", "scene_1_seed_1"]
  object: ["7221"]
  description: "Single object open test for pipeline validation"

plan_cfg:
  resume: true  # Skip already completed planning tasks
  voxel_dims: [5.0, 5.0, 5.0]
  voxel_size: 0.02
  expand_dims: [1.0, 0.2, 0.2]
  collision_checker_type: "VOXEL"
  output_dir: "data/single_object_open_test"
  num_grasps: 20
  cluster:
    ap_fallback_clusters: 30
    ap_clusters_upperbound: 80
    ap_cluster_lowerbound: 10
  plan_ik:
    limit: [100, 100]
  plan_traj:
    stage_type: MOVE_ARTICULATED
    batch_size: 10
    expand_to_pairs: true
  filter:
    stage_type: MOVE_ARTICULATED
    position_threshold: 0.01
    orientation_threshold: 0.05

scene_cfg:
  scene_0_seed_0:
    path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/info/metadata.json"
  scene_1_seed_1:
    path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/info/metadata.json"

object_cfg:
  "7221":
    path: assets/object/Microwave/7221/7221_0_scaling.urdf
    pose: [0, 0, 0, 1, 0, 0, 0]
    asset_type: "Microwave"
    asset_id: "7221"
    scale: 0.3563
    start_angles: [0]
    goal_angles: [1.333, 1.23, 1.074, 0.997]

robot_cfg:
  robot_type: "summit_franka"
  path: "assets/robot/summit_franka/summit_franka.yml"

# Robot config template for articulated object planning (fixed base)
# Path will be populated with: assets/object/{asset_type}/{asset_id}/summit_franka_{asset_id}_0_grasp_{grasp_id:04d}.yml
akr_robot_cfg:
  robot_type: "summit_franka"
  path: ""  # Template path, populated dynamically with asset_type, asset_id, grasp_id
            # assets/object/{asset_type}/{asset_id}/{robot_type}_{asset_id}_0_grasp_{grasp_id:04d}.yml
  fixed_base: true
