# Record Configuration for Single Object Reach Test Experiment
# Configuration for rendering datasets from planned reach trajectories
#
# Key difference from open task: No object articulation during recording

# =============================================================================
# Experiment Info
# =============================================================================
info_cfg:
  task: "single_object_reach"
  robot: "summit_franka"
  scene: [scene_0_seed_0, scene_1_seed_1, scene_3_seed_3, scene_7_seed_7, scene_8_seed_8]
  object: ["7221"]
  description: "Record manipulation data for single object reach task"

# =============================================================================
# Record Configuration
# =============================================================================
record_cfg:
  max_episodes: 500
  steps_per_episode: 32
  skip_existing: true
  seed: 42
  
  # Data Source Configuration (where to load trajectory data from)
  data_cfg:
    traj_dir: "data/single_object_reach/traj"
    input_format: "pt"  # PyTorch tensor files
    
  # Dataset Output Configuration (where to save recorded data)
  dataset_cfg:
    repo_id: "single_object_reach"
    root: "data/single_object_reach/lerobot"
    fps: 15
    use_videos: true
    push_to_hub: false
    robot_type: "summit_franka"
    state_dim: 12
    state_names:
      - base_x
      - base_y
      - base_z
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
      - panda_finger_joint1
      - panda_finger_joint2
    task: "reach_grasp_position"
    # for IO problem
    use_ramdisk: true
    ramdisk_path: "/dev/shm"


# =============================================================================
# Environment Configuration (for Isaac Sim)
# =============================================================================
env_cfg:
  # Object Configuration
  object_cfg:
    "7221":
      path: assets/object/Microwave/7221/7221_0_scaling.urdf
      pose: [0, 0, 0, 1, 0, 0, 0]
      asset_type: "Microwave"
      asset_id: "7221"
      scale: 0.3563
      start_angles: [0]  # Object stays closed during reach
      goal_angles: [0]
