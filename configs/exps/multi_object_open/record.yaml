# Record Configuration for Single Object Open Test Experiment
# Configuration for rendering datasets from planned trajectories

# =============================================================================
# Experiment Info
# =============================================================================
info_cfg:
  task: "multi_object_open"
  robot: "summit_franka"
  scene: [scene_0_seed_0, scene_1_seed_1, scene_3_seed_3, scene_7_seed_7, scene_8_seed_8, scene_9_seed_9, scene_10_seed_10, scene_12_seed_12, scene_13_seed_13, scene_16_seed_16, scene_17_seed_17, scene_18_seed_18, scene_20_seed_20, scene_21_seed_21, scene_23_seed_23, scene_24_seed_24, scene_25_seed_25, scene_27_seed_27, scene_28_seed_28, scene_29_seed_29, scene_30_seed_30, scene_31_seed_31, scene_32_seed_32, scene_33_seed_33, scene_34_seed_34, scene_35_seed_35, scene_36_seed_36, scene_38_seed_38, scene_39_seed_39, scene_40_seed_40, scene_41_seed_41, scene_42_seed_42, scene_43_seed_43, scene_44_seed_44, scene_45_seed_45, scene_46_seed_46, scene_47_seed_47, scene_48_seed_48, scene_52_seed_52, scene_53_seed_53]
  object: ["7221", "11622", "103634", "46197", "101773"]
  description: "Record manipulation data for multi object open"

# =============================================================================
# Record Configuration
# =============================================================================
record_cfg:
  max_episodes: 500
  steps_per_episode: 32
  skip_existing: true
  seed: 42
  
  # Data Source Configuration (where to load trajectory data from)
  data_cfg:
    traj_dir: "data/multi_object_open/traj"
    input_format: "pt"  # PyTorch tensor files
    
  # Dataset Output Configuration (where to save recorded data)
  dataset_cfg:
    repo_id: "multi_object_open"
    root: "data/multi_object_open/lerobot"
    fps: 15
    use_videos: true
    push_to_hub: false
    robot_type: "summit_franka"
    state_dim: 12
    state_names:
      - base_x
      - base_y
      - base_z
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
      - panda_finger_joint1
      - panda_finger_joint2
    task: "open_articulated_object"
    # for IO problem
    use_ramdisk: true
    ramdisk_path: "/dev/shm"


# =============================================================================
# Environment Configuration (for Isaac Sim)
# =============================================================================
env_cfg:
  # Object Configuration
  object_cfg:
    "7221":
      path: assets/object/Microwave/7221/7221_0_scaling.urdf
      pose: [0, 0, 0, 1, 0, 0, 0]
      asset_type: "Microwave"
      asset_id: "7221"
      scale: 0.3563
      
    "11622":
      path: assets/object/Dishwasher/11622/11622_0_scaling.urdf
      pose: [0, 0, 0, 1, 0, 0, 0]
      asset_type: "Dishwasher"
      asset_id: "11622"
      scale: 0.6446
      
    "103634":
      path: assets/object/TrashCan/103634/103634_0_scaling.urdf
      pose: [0, 0, 0, 1, 0, 0, 0]
      asset_type: "TrashCan"
      asset_id: "103634"
      scale: 0.4839
      
    "46197":
      path: assets/object/Cabinet/46197/46197_0_scaling.urdf
      pose: [0, 0, 0, 1, 0, 0, 0]
      asset_type: "Cabinet"
      asset_id: "46197"
      scale: 0.5113
      
    "10944":
      path: assets/object/Refrigerator/10944/10944_0_scaling.urdf
      pose: [0, 0, 0, 1, 0, 0, 0]
      asset_type: "Refrigerator"
