# Evaluation Configuration for Multi-Object Open Experiment
# Configuration for evaluating trained DP and ACT policies

# =============================================================================
# Experiment Info
# =============================================================================
info_cfg:
  task: "multi_object_open"
  robot: "summit_franka"
  description: "Evaluate DP and ACT policies on multi-object open task"

# =============================================================================
# Unified Eval Configuration
# =============================================================================
eval_cfg:
  checkpoint_path: "outputs/train/multi_object_open/model_final.pt"
  policy_type: "diffusion"  # Options: "diffusion" (DP) or "act" (ACT)
  num_episodes: 60
  max_steps_per_episode: 500
  success_threshold: 0.05
  use_async_inference: true
  device: "cuda"
  output_dir: "outputs/eval/multi_object_open"
  test_data_dir: "data/multi_object_open/traj"

# =============================================================================
# Model Configuration
# =============================================================================
model:
  checkpoint_path: "outputs/train/multi_object_open/model_final.pt"
  policy_type: "diffusion"
  
  # Model checkpoints for each policy type
  checkpoints:
    diffusion: "outputs/train/multi_object_open/dp/model_final.pt"
    act: "outputs/train/multi_object_open/act/model_final.pt"
  
# =============================================================================
# Evaluation Parameters
# =============================================================================
evaluation:
  num_episodes: 60  # 20 episodes per object (3 objects)
  max_steps_per_episode: 500
  success_threshold: 0.05  # Position error threshold in meters
  
  # Success criteria
  criteria:
    position_threshold: 0.05   # meters
    orientation_threshold: 0.1  # radians
    angle_threshold: 0.1        # radians for articulation
    completion_required: true
    
# =============================================================================
# Async Inference Configuration (for LeRobot)
# =============================================================================
async_inference:
  enabled: true
  host: "localhost"
  port: 50051
  timeout: 30.0
  max_queue_size: 100
  worker_threads: 1
  
# =============================================================================
# Output Configuration
# =============================================================================
output:
  output_dir: "outputs/eval/multi_object_open"
  save_videos: true
  save_trajectories: true
  save_observations: false
  
  # Separate output for each model type
  dp_output_dir: "outputs/eval/multi_object_open/dp"
  act_output_dir: "outputs/eval/multi_object_open/act"
  
  # Video settings
  video:
    fps: 15
    codec: "mp4v"
    resolution: [640, 480]
    
# =============================================================================
# Hardware Configuration
# =============================================================================
hardware:
  device: "cuda"
  
# =============================================================================
# Environment Configuration (for simulation evaluation)
# =============================================================================
env_cfg:
  sim:
    headless: true
    width: 640
    height: 480
  robot_cfg:
    path: "assets/robot/summit_franka/summit_franka.yml"
    mobile_base_dof: 3

# =============================================================================
# Scene Configuration
# =============================================================================
scene_cfg:
  scene_0_seed_0:
    path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/info/metadata.json"
  scene_1_seed_1:
    path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/info/metadata.json"
  scene_3_seed_3:
    path: "assets/scene/infinigen/kitchen_1130/scene_3_seed_3/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_3_seed_3/info/metadata.json"
    
# =============================================================================
# Object Configuration
# =============================================================================
