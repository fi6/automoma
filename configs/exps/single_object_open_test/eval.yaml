# Evaluation Configuration for Single Object Open Test Experiment
# Configuration for evaluating trained DP and ACT policies
# Test on: scene_0_seed_0, scene_1_seed_1, scene_40_seed_40

info_cfg:
  task: "single_object_open_test"
  robot: "summit_franka"
  description: "Evaluate DP and ACT policies on single object open test"

# Test configuration
test_scenes: ["scene_0_seed_0", "scene_1_seed_1", "scene_40_seed_40"]
test_objects: ["7221"]

# Data split configuration
data_split:
  train_scenes: ["scene_0_seed_0", "scene_1_seed_1"]
  test_scenes: ["scene_0_seed_0", "scene_1_seed_1", "scene_40_seed_40"]
  # Note: scene_0 and scene_1 are in both train and test to test memorization
  # scene_40 is held-out to test generalization

# Unified eval configuration (for scripts)
eval_cfg:
  checkpoint_path: "outputs/train/single_object_open_test/model_final.pt"
  policy_type: "diffusion"  # Options: "diffusion" (DP) or "act" (ACT)
  num_episodes: 30
  max_steps_per_episode: 500
  success_threshold: 0.05
  use_async_inference: true
  device: "cuda"
  output_dir: "outputs/eval/single_object_open_test"
  # Test data directory for initial states
  test_data_dir: "data/single_object_open_test/traj"

# Model configuration - supports both DP and ACT
model:
  checkpoint_path: "outputs/train/single_object_open_test/model_final.pt"
  policy_type: "diffusion"  # Must match training config: diffusion (DP) or act (ACT)
  
  # Model checkpoints for each policy type
  checkpoints:
    diffusion: "outputs/train/single_object_open_test/dp/model_final.pt"
    act: "outputs/train/single_object_open_test/act/model_final.pt"
  
# Evaluation parameters
evaluation:
  num_episodes: 30  # 10 episodes per test scene (3 scenes)
  max_steps_per_episode: 500
  success_threshold: 0.05  # Position error threshold in meters
  
  # Per-scene episode distribution
  episodes_per_scene:
    scene_0_seed_0: 10
    scene_1_seed_1: 10
    scene_40_seed_40: 10
  
  # Success criteria
  criteria:
    position_threshold: 0.05   # meters
    orientation_threshold: 0.1  # radians
    angle_threshold: 0.1        # radians for articulation
    completion_required: true
    
# Async inference configuration (for LeRobot)
async_inference:
  enabled: true
  host: "localhost"
  port: 50051
  timeout: 30.0
  
  # Queue configuration
  max_queue_size: 100
  worker_threads: 1
  
# Output configuration
output:
  output_dir: "outputs/eval/single_object_open_test"
  save_videos: true
  save_trajectories: true
  save_observations: false  # Save raw observations
  
  # Separate output for each model type
  dp_output_dir: "outputs/eval/single_object_open_test/dp"
  act_output_dir: "outputs/eval/single_object_open_test/act"
  
  # Video settings
  video:
    fps: 15
    codec: "mp4v"
    resolution: [640, 480]
    
# Hardware configuration
hardware:
  device: "cuda"
  
# Environment configuration (for simulation evaluation)
env_cfg:
  sim:
    headless: true  # Run headless for evaluation
    width: 640
    height: 480
  robot_cfg:
    path: "assets/robot/summit_franka/summit_franka.yml"
    mobile_base_dof: 3

# Scene configurations to evaluate on
scene_cfg:
  scene_0_seed_0:
    path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_0_seed_0/info/metadata.json"
  scene_1_seed_1:
    path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_1_seed_1/info/metadata.json"
  scene_40_seed_40:
    path: "assets/scene/infinigen/kitchen_1130/scene_40_seed_40/export/export_scene.blend/export_scene.usdc"
    pose: [0, 0, -0.13, 1, 0, 0, 0]
    metadata_path: "assets/scene/infinigen/kitchen_1130/scene_40_seed_40/info/metadata.json"
    
# Object configurations to evaluate on (only 7221)
object_cfg:
  "7221":
    path: "assets/object/Microwave/7221/7221_0_scaling.urdf"
    asset_type: "Microwave"
    asset_id: "7221"
    scale: 0.3563
    goal_angle: 1.57  # Target open angle
    start_angles: [0]
    goal_angles: [1.57, 0.9]
    
# Metrics to compute
metrics:
  position_error: true
  orientation_error: true
  joint_error: true
  trajectory_smoothness: true
  inference_time: true
  success_rate: true
  # Per-scene metrics
  per_scene_success_rate: true
  generalization_gap: true  # Difference between train and test scene performance
  
# Visualization settings
visualization:
  show_trajectory: true
  show_goal: true
  show_collision: false
